# Bean Validation 注解 message i18n - 中文
# 命名: validation.<RequestClass>.<field>.<rule>
# 在 @NotBlank(message = "{validation.LoginRequest.username.required}") 中通过 {key} 引用

validation.ScriptCreateRequest.name.required=脚本名称不能为空
validation.AuthSourceCreateRequest.name.required=名称必填
validation.AuthSourceCreateRequest.type.required=类型必填
validation.AuthSourceUpdateRequest.type.required=类型必填(用于多态配置反序列化)
validation.ScriptCommitRequest.message.required=提交说明必填
validation.WorkflowScheduleRequest.cron.required=Cron 表达式必填
validation.ScriptDispatchRequest.workflowDefinitionCode.required=workflowDefinitionCode 不能为 null
validation.ScriptDispatchRequest.mode.required=mode 不能为 null
validation.LoginRequest.username.required=用户名必填
validation.LoginRequest.password.required=密码必填
validation.DirectExecuteRequest.taskType.required=任务类型必填
validation.DirectExecuteRequest.content.required=SQL/脚本内容必填
