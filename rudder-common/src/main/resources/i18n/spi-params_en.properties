# SPI provider param labels / placeholders - English
# Naming: spi.<type>.<provider>.<paramName>.<label|placeholder>
# Plain English literals (API Key / Endpoint / Host) are not listed; useCodeAsDefaultMessage=true returns them as-is.

# === Approval Lark ===
spi.approval.lark.appSecret.placeholder=Lark application App Secret
spi.approval.lark.approvalCode.placeholder=Approval definition Code (copy the definitionCode query param from the URL)
spi.approval.lark.titleWidgetId.label=Title widget ID
spi.approval.lark.titleWidgetId.placeholder=Widget ID of the "title" control in the Lark approval form
spi.approval.lark.contentWidgetId.label=Content widget ID
spi.approval.lark.contentWidgetId.placeholder=Widget ID of the "content" control in the Lark approval form
spi.approval.lark.applicantWidgetId.label=Applicant widget ID
spi.approval.lark.applicantWidgetId.placeholder=Widget ID of the "applicant" people control (optional)
spi.approval.lark.stageFieldMapping.label=Stage → widget ID JSON mapping
spi.approval.lark.encryptKey.placeholder=Event subscription encrypt key (optional)
spi.approval.lark.verificationToken.placeholder=Event subscription verification token (optional)

# === Approval Kissflow ===
spi.approval.kissflow.processId.placeholder=Approval Process ID
spi.approval.kissflow.titleField.label=Title field name
spi.approval.kissflow.titleField.placeholder=Default: Title
spi.approval.kissflow.contentField.label=Content field name
spi.approval.kissflow.contentField.placeholder=Default: Description
spi.approval.kissflow.applicantField.label=Applicant field name
spi.approval.kissflow.applicantField.placeholder=Kissflow applicant field (optional, person type)
spi.approval.kissflow.stageFieldMapping.label=Stage → field name JSON mapping

# === Runtime (Aliyun / AWS / Local) ===
spi.runtime.config.label=Config
spi.runtime.config.placeholder=One KEY=VALUE per line; lines starting with # are comments. See the guide on the right for the full key list.
spi.runtime.envVars.label=Environment variables
spi.runtime.envVars.placeholder=One KEY=VALUE per line; injected into the execution context of every task.

# === Version Git ===
spi.version.git.token.placeholder=Gitea personal access token

# === Embedding Zhipu ===
spi.embedding.zhipu.apiKey.placeholder=xxx.yyy (Zhipu BigModel API key)
