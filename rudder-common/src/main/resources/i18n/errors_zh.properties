# 业务错误消息 - 中文
# Key 与 ErrorCode enum 字段对齐: err.<EnumSimpleName>.<NAME>
# {0},{1}... 是 MessageFormat 占位符,由 BizException(code, args...) 在出口填充
# 漏译时 useCodeAsDefaultMessage=true 让 handler 直接吐 key,运维肉眼可见

