# MCP capability 描述 - 中文
# 命名: capability.<id 同 CapabilityIds>.description

capability.workspace.view.description=查看当前工作空间信息（成员 / 元数据）
capability.metadata.browse.description=浏览元数据 / 表 / 血缘
capability.datasource.view.description=查看数据源（凭证脱敏）
capability.datasource.test.description=测试数据源连通性
capability.datasource.manage.description=增删改数据源（全局资源，仅 SUPER_ADMIN）
capability.project.browse.description=浏览项目（项目元信息）
capability.project.author.description=创建/修改/删除项目
capability.script.browse.description=浏览脚本
capability.script.author.description=创建/修改/删除脚本
capability.execution.view_status.description=查看任务状态/日志
capability.execution.view_result.description=查看任务结果
capability.execution.run.description=执行脚本（生产风险）
capability.execution.cancel.description=取消运行中任务
capability.workflow.browse.description=浏览工作流定义/实例
capability.workflow.author.description=创建/修改工作流
capability.workflow.run.description=运行/取消工作流
capability.workflow.publish.description=发布工作流到生产
capability.approval.view.description=查看审批列表
capability.approval.act.description=审批操作（通过/拒绝）
capability.knowledge.search.description=检索工作空间知识库（RAG 语义 + 关键词兜底）
