server:
  port: ${RUDDER_API_PORT:5680}
  # 静态资源 + JSON 响应启用 gzip,与前端 vite-plugin-compression 双保险
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,application/xml
    min-response-size: 1024

spring:
  application:
    name: rudder
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${RUDDER_DB_URL:jdbc:mysql://127.0.0.1:3306/rudder?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true}
    username: ${RUDDER_DB_USERNAME:rudder}
    password: ${RUDDER_DB_PASSWORD:rudder123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
  sql:
    init:
      mode: ${RUDDER_SQL_INIT_MODE:always}
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    # Jackson 3 默认 LocalDateTime 就序列化成 ISO 字符串,WRITE_DATES_AS_TIMESTAMPS 这个 flag 已删
  # Redis 连接(平台强依赖,和 MySQL 一样;用于流取消广播、限流、预算扣减、分布式缓存)
  data:
    redis:
      host: ${RUDDER_REDIS_HOST:127.0.0.1}
      port: ${RUDDER_REDIS_PORT:6379}
      password: ${RUDDER_REDIS_PASSWORD:}
      database: ${RUDDER_REDIS_DB:0}
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  task:
    execution:
      # audit log 走 @Async，不设上限的话 Spring Boot 默认 queue=Integer.MAX_VALUE
      # DB 延迟或突发写入会持续积压 → OOM。宁可丢 audit 也不能吃爆内存。
      # 高流量部署通过 env 调大 queue-capacity，低规格部署调小。
      pool:
        core-size: ${RUDDER_ASYNC_CORE_SIZE:4}
        max-size: ${RUDDER_ASYNC_MAX_SIZE:16}
        queue-capacity: ${RUDDER_ASYNC_QUEUE_CAPACITY:1000}
        keep-alive: 60s
      thread-name-prefix: rudder-async-

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Prometheus / actuator —— 平台级观测基础,任何模块都可以加指标
# 访问:GET /actuator/prometheus(生产环境建议通过 IP 白名单或单独 management.server.port)
management:
  endpoints:
    web:
      exposure:
        include: ${RUDDER_ACTUATOR_ENDPOINTS:health,info,prometheus}
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: read_only
  metrics:
    tags:
      application: rudder-api

rudder:
  # 节点标识(多节点部署时用于日志/指标标签;留空自动用 hostname-pid)
  node-id: ${RUDDER_NODE_ID:}
  # RPC 通信
  rpc:
    port: ${RUDDER_API_RPC_PORT:5690}
    # Server 和 Execution 必须配置相同值（至少 32 字节）。未配置时启动失败
    auth-secret: ${RUDDER_RPC_AUTH_SECRET:}
  # 安全
  security:
    jwt-secret: ${RUDDER_JWT_SECRET:}
    # 12h:平衡用户体验(每天工作时段内不被踢)和被盗 token 的风险窗口
    jwt-expiration: 43200000
    encrypt-key: ${RUDDER_ENCRYPT_KEY:}
  # 工作流
  workflow:
    executor-threads: ${RUDDER_WORKFLOW_EXECUTOR_THREADS:100}
  # 文件存储
  file:
    local-dir: ${RUDDER_FILE_LOCAL_DIR:./local/rudder-data}
  mcp:
    # 每 token 每分钟最多调用次数。0 = 不限流（开发环境）。
    # 超限返 HTTP 429 + 审计 status=DENIED, code=RATE_LIMITED。
    rate-limit:
      per-minute: ${RUDDER_MCP_RATE_LIMIT_PER_MINUTE:120}


# Spring AI MCP server (协议层 + 总开关)
spring.ai.mcp.server:
  enabled: ${RUDDER_MCP_ENABLED:true}
  name: rudder
  version: 0.1.0
  protocol: STREAMABLE      # SSE / STREAMABLE / STATELESS
  type: SYNC                # 同步模式, 便于 ThreadLocal (UserContext / RequestContextHolder) 透传

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  scalar:
    path: /scalar

logging:
  level:
    io.github.zzih.rudder: ${RUDDER_LOG_LEVEL:DEBUG}
    org.springframework: INFO
